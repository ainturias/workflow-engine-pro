services:
  # ================================
  # Base de Datos - MongoDB
  # ================================
  mongodb:
    image: mongo:7
    container_name: workflow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: workflow_engine
    networks:
      - workflow-network

  # ================================
  # Backend - Spring Boot API
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/workflow_engine
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongodb
    networks:
      - workflow-network

  # ================================
  # AI Service - FastAPI
  # ================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: workflow-ai-service
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: workflow_engine
    depends_on:
      - mongodb
    networks:
      - workflow-network

  # ================================
  # Frontend - Angular (solo producción)
  # ================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: workflow-frontend
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend
  #     - ai-service
  #   networks:
  #     - workflow-network

volumes:
  mongodb_data:
    driver: local

networks:
  workflow-network:
    driver: bridge
