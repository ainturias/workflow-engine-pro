# ================================
# Application
# ================================
spring.application.name=workflow-api
server.port=8080

# ================================
# MongoDB
# ================================
spring.data.mongodb.uri=mongodb://localhost:27017/workflow_engine

# ================================
# JWT Security
# ================================
jwt.secret=workflow-engine-secret-key-change-in-production
jwt.expiration=86400000

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:80

# ================================
# WebSocket
# ================================
app.websocket.endpoint=/ws

# ================================
# AI Service
# ================================
app.ai-service.url=http://localhost:8000
